name: Daily pipeline

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:
    inputs:
      year_month:
        description: 'Process a specific month (YYYY-MM). Leave blank for latest.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs:           true
          token:         ${{ secrets.GITHUB_TOKEN }}
          fetch-depth:   0   # full history — shallow clones break branch operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: |
          cd pipeline
          pip install -r requirements.txt

      - name: Run processing pipeline
        env:
          YEAR_MONTH: ${{ github.event.inputs.year_month }}
        run: |
          cd pipeline
          python process.py

      - name: Determine month label
        id: label
        run: |
          if [ -n "${{ github.event.inputs.year_month }}" ]; then
            echo "month=${{ github.event.inputs.year_month }}" >> $GITHUB_OUTPUT
          else
            echo "month=$(date -u +%Y-%m)" >> $GITHUB_OUTPUT
          fi

      - name: Save latest.json to temp before branch switch
        run: |
          cp pipeline/output/latest.json /tmp/latest.json

      - name: Checkout tiles branch (orphan if first run)
        run: |
          set -x   # print every command — needed to diagnose branch issues
          git fetch origin tiles 2>&1 || echo "FETCH FAILED (expected on first run)"
          if git show-ref --verify --quiet refs/remotes/origin/tiles; then
            echo "tiles branch exists remotely — checking it out"
            git checkout tiles
          else
            echo "tiles branch does NOT exist — creating orphan branch"
            git checkout --orphan tiles
            git rm -rf . 2>&1 || echo "rm had nothing to remove (expected)"
          fi
          echo "Current branch: $(git branch --show-current)"
          ls -la

      - name: Copy tiles into branch
        run: |
          MONTH="${{ steps.label.outputs.month }}"
          mkdir -p "tiles/${MONTH}/sst" "tiles/${MONTH}/anomaly"
          # NOTE: trailing /. on the source copies CONTENTS into the target,
          # not the directory itself. Without it, cp -r src/ dst/ creates
          # dst/src/ (a nested duplicate folder) — that was the original bug.
          cp -r pipeline/output/sst/.     "tiles/${MONTH}/sst/"
          cp -r pipeline/output/anomaly/. "tiles/${MONTH}/anomaly/"
          cp /tmp/latest.json "tiles/latest.json"
          echo "Verifying structure:"
          find "tiles/${MONTH}" -maxdepth 3 -type d

      - name: Commit and push tiles branch
        run: |
          set -x
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tiles/
          git status
          git diff --staged --quiet && echo "NOTHING TO COMMIT" || git commit -m "tiles: ${{ steps.label.outputs.month }}"
          git push origin tiles 2>&1
          echo "Push exit code: $?"

      - name: Switch back to main and update latest.json
        run: |
          # Force checkout — discard any untracked files left from tiles branch
          git checkout -f main
          cp /tmp/latest.json web/public/latest.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/latest.json
          git diff --staged --quiet || git commit -m "chore: update latest.json [${{ steps.label.outputs.month }}]"
          git push origin main