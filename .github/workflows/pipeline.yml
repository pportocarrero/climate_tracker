name: Daily pipeline

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:
    inputs:
      year_month:
        description: 'Process a specific month (YYYY-MM). Leave blank for latest.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs:           true
          token:         ${{ secrets.GITHUB_TOKEN }}
          fetch-depth:   0   # full history — shallow clones break branch operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: |
          cd pipeline
          pip install -r requirements.txt

      - name: Run processing pipeline
        env:
          YEAR_MONTH: ${{ github.event.inputs.year_month }}
        run: |
          cd pipeline
          python process.py

      - name: Determine month label from manifest
        id: label
        run: |
          # Read the actual processed month from latest.json instead of
          # recalculating it — process.py defaults to PREVIOUS month (since
          # the current month's data isn't finalized yet), so recomputing
          # "today's month" here caused a mismatch with the real tile folder.
          MONTH=$(python3 -c "import json; print(json.load(open('pipeline/output/latest.json'))['date'])")
          echo "month=${MONTH}" >> $GITHUB_OUTPUT
          echo "Processed month: ${MONTH}"

      - name: Save manifests and scripts to temp before branch switch
        run: |
          cp pipeline/output/latest.json /tmp/latest.json
          cp pipeline/build_index.py /tmp/build_index.py

      - name: Checkout tiles branch (orphan if first run)
        run: |
          set -x   # print every command — needed to diagnose branch issues
          git fetch origin tiles 2>&1 || echo "FETCH FAILED (expected on first run)"
          if git show-ref --verify --quiet refs/remotes/origin/tiles; then
            echo "tiles branch exists remotely — checking it out"
            git checkout tiles
          else
            echo "tiles branch does NOT exist — creating orphan branch"
            git checkout --orphan tiles
            git rm -rf . 2>&1 || echo "rm had nothing to remove (expected)"
          fi
          echo "Current branch: $(git branch --show-current)"
          ls -la

      - name: Copy tiles into branch
        run: |
          MONTH="${{ steps.label.outputs.month }}"
          # Wipe any stale data for this month first — a previous buggy run
          # left nested duplicate folders (e.g. anomaly/anomaly/) sitting
          # here; without this rm, those accumulate across every run.
          rm -rf "tiles/${MONTH}"
          mkdir -p "tiles/${MONTH}/sst" "tiles/${MONTH}/anomaly"
          # Trailing /. on the source copies CONTENTS into the target,
          # not the directory itself. Without it, cp -r src/ dst/ creates
          # dst/src/ (a nested duplicate folder) — that was the original bug.
          cp -r pipeline/output/sst/.     "tiles/${MONTH}/sst/"
          cp -r pipeline/output/anomaly/. "tiles/${MONTH}/anomaly/"
          # Per-month manifest — makes each month self-describing, so the
          # date picker can fetch a historical month's indices/condition
          # without needing a giant master index.
          cp /tmp/latest.json "tiles/${MONTH}/manifest.json"
          # latest.json at branch root still tracks the most recent run,
          # used by the "Current conditions" view.
          cp /tmp/latest.json "tiles/latest.json"
          echo "Verifying structure:"
          find "tiles/${MONTH}" -maxdepth 3 -type d

      - name: Regenerate available-months index
        run: |
          python3 /tmp/build_index.py
          cp tiles/available-months.json /tmp/available-months.json

      - name: Commit and push tiles branch
        run: |
          set -x
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tiles/
          git status
          git diff --staged --quiet && echo "NOTHING TO COMMIT" || git commit -m "tiles: ${{ steps.label.outputs.month }}"
          git push origin tiles 2>&1
          echo "Push exit code: $?"

      - name: Switch back to main and update manifests
        run: |
          # Force checkout — discard any untracked files left from tiles branch
          git checkout -f main
          cp /tmp/latest.json web/public/latest.json
          cp /tmp/available-months.json web/public/available-months.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/latest.json web/public/available-months.json
          git diff --staged --quiet || git commit -m "chore: update manifests [${{ steps.label.outputs.month }}]"
          git push origin main
