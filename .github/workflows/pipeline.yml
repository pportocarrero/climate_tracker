name: Daily pipeline

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:
    inputs:
      year_month:
        description: 'Process a specific month (YYYY-MM). Leave blank for latest.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: |
          cd pipeline
          pip install -r requirements.txt

      - name: Run processing pipeline
        env:
          YEAR_MONTH: ${{ github.event.inputs.year_month }}
        run: |
          cd pipeline
          python process.py

      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.year_month }}" ]; then
            echo "tag=tiles-${{ github.event.inputs.year_month }}" >> $GITHUB_OUTPUT
          else
            echo "tag=tiles-$(date -u +%Y-%m)" >> $GITHUB_OUTPUT
          fi

      - name: Delete existing release for this month (if re-running)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release delete ${{ steps.tag.outputs.tag }} --yes --repo ${{ github.repository }} || true

      - name: Flatten tile files for GitHub Release upload
        run: |
          # GitHub Releases can't store directories.
          # Rename z/x/y.png -> layer_z_x_y.png so all tiles are flat files.
          mkdir -p pipeline/flat
          for layer in sst anomaly; do
            find pipeline/output/${layer} -name "*.png" | while read f; do
              # f = pipeline/output/sst/0/0/0.png
              rel="${f#pipeline/output/${layer}/}"   # 0/0/0.png
              flat="${rel//\//_}"                     # 0_0_0.png
              cp "$f" "pipeline/flat/${layer}_${flat}"
            done
          done
          cp pipeline/output/latest.json pipeline/flat/latest.json
          echo "Total files: $(ls pipeline/flat | wc -l)"

      - name: Upload tiles to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release create ${{ steps.tag.outputs.tag }} \
            --repo ${{ github.repository }} \
            --title "Tiles ${{ steps.tag.outputs.tag }}" \
            --notes "Auto-generated SST tiles for ${{ steps.tag.outputs.tag }}" \
            pipeline/flat/*

      - name: Update latest.json in repo
        run: |
          cp pipeline/output/latest.json web/public/latest.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/latest.json
          git diff --staged --quiet || git commit -m "chore: update latest.json [${{ steps.tag.outputs.tag }}]"
          git push
